name: Build and deploy Node.js app to Azure Web App - visitor-entry-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'   # ✅ speed + security

      - name: Install dependencies
        run: npm ci      # ✅ safer than npm install

      - name: Build project
        run: npm run build

      - name: Run tests (skip if none)
        run: npm test -- --passWithNoTests

      # ✅ Upload ONLY build output (IMPORTANT)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build   # ✅ ensures correct structure

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_754BF7E7F6264DD7A9E651F7188A20D0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_33EBA0BA0933471BA01BF1451D91741F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AC456833156F452CA9C6D26B0217CA6D }}

      # ✅ Deploy ONLY build folder (CRITICAL FIX)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'visitor-entry-frontend'
          slot-name: 'Production'
          package: build
